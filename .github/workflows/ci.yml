name: CI (Java)

on:
  push:
    branches: [ "main" ]
    paths:
      - "api-client-java/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "api-client-java/**"
      - ".github/workflows/ci.yml"

jobs:
  java:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-client-java
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build & test
        run: mvn -B clean test
